<!DOCTYPE html>
<html>
<head>
  <title>Chat Rooms</title>

  <style>
    body { font-family: Arial; margin: 0; }

    #login {
      position: fixed;
      inset: 0;
      background: #111;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      color: white;
      z-index: 9999;
    }

    #login input {
      padding: 10px;
      font-size: 16px;
      margin-top: 10px;
    }

    #login button {
      margin-top: 10px;
      padding: 10px 20px;
      cursor: pointer;
    }

    #topBar {
      display: flex;
      padding: 10px;
      border-bottom: 1px solid #ccc;
      gap: 10px;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    #inputBar {
      display: flex;
      border-top: 1px solid #ccc;
    }

    #msg {
      flex: 1;
      padding: 10px;
    }

    button {
      padding: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN SCREEN -->
<div id="login">
  <h2>Enter Username</h2>
  <input id="nameInput" placeholder="Username" />
  <button onclick="enterChat()">Join Chat</button>
</div>

<!-- CHAT UI -->
<div id="app" style="display:none;">

  <div id="topBar">
    <select id="roomSelect" onchange="switchRoom()">
      <option value="general">General</option>
      <option value="school">School</option>
    </select>
  </div>

  <div id="chat"></div>

  <div id="inputBar">
    <input id="msg" placeholder="Message..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

<script>
const firebaseConfig = YOUR_FIREBASE_CONFIG;

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let name = localStorage.getItem("chatName");
let currentRoom = "general";

function enterChat() {
  const input = document.getElementById("nameInput").value.trim();
  if (!input) return;

  name = input;
  localStorage.setItem("chatName", name);

  document.getElementById("login").style.display = "none";
  document.getElementById("app").style.display = "block";

  startRoom();
}

function getRoomRef(room) {
  return db.ref("rooms/" + room);
}

function switchRoom() {
  currentRoom = document.getElementById("roomSelect").value;
  document.getElementById("chat").innerHTML = "";
  startRoom();
}

function send() {
  const msg = document.getElementById("msg").value;
  if (!msg) return;

  getRoomRef(currentRoom).push({
    name: name,
    msg: msg,
    time: Date.now()
  });

  document.getElementById("msg").value = "";
}

function startRoom() {
  getRoomRef(currentRoom).off();

  getRoomRef(currentRoom).on("child_added", (snap) => {
    const data = snap.val();

    const div = document.createElement("div");
    div.innerHTML = `<b>${data.name}</b>: ${data.msg}`;

    document.getElementById("chat").appendChild(div);
    document.getElementById("chat").scrollTop = 999999;
  });
}

// auto-login
window.onload = function () {
  if (name) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "block";
    startRoom();
  }
};
</script>

</body>
</html>
