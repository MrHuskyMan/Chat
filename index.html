<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Chat</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #111;
      color: white;
    }

    #topbar {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #1c1c1c;
      align-items: center;
    }

    #chat {
      height: 80vh;
      overflow-y: auto;
      padding: 10px;
    }

    #inputBar {
      display: flex;
      padding: 10px;
      background: #1c1c1c;
      gap: 10px;
    }

    input, select, button {
      padding: 8px;
    }

    button {
      cursor: pointer;
    }
  </style>
</head>

<body>

  <!-- Top bar -->
  <div id="topbar">
    <select id="room">
      <option value="general">General</option>
      <option value="school">School</option>
    </select>

    <button onclick="changeUsername()">Name</button>
  </div>

  <!-- Chat messages -->
  <div id="chat"></div>

  <!-- Input area -->
  <div id="inputBar">
    <input id="msgInput" placeholder="Type message..." />
    <button onclick="sendMsg()">Send</button>
  </div>

  <!-- Script -->
  <script src="script.js"></script>

</body>
</html>
